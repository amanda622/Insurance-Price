<!DOCTYPE html>
<html>
<head>
    <title>Insurance Price Predictor</title>
</head>
<body>
    <h1>Insurance Price Prediction</h1>
    <form action="/predict" method="post">
        <label for="age">Age:</label><br>
        <input type="number" id="age" name="age" required><br>

        <label for="bmi">BMI:</label><br>
        <input type="number" step="0.1" id="bmi" name="bmi" required><br>

        <label for="children">Children:</label><br>
        <input type="number" id="children" name="children" required><br>

        <label for="smoker">Smoker:</label><br>
        <select id="smoker" name="smoker">
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select><br><br>

        <input type="submit" value="Predict">
    </form>
</body>
</html>
