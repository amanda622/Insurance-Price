<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Insurance Price Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="card">
        <h1>Insurance Price Prediction</h1>
        <p class="subtitle">Estimate annual health insurance charges.</p>

        <form action="/web/predict" method="post">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="0" max="120" required>

            <label for="sex">Sex</label>
            <select id="sex" name="sex">
                {% for sex in sexes %}
                <option value="{{ sex.value }}">{{ sex.value|capitalize }}</option>
                {% endfor %}
            </select>

            <label for="bmi">BMI</label>
            <input type="number" step="0.1" id="bmi" name="bmi" min="1" required>

            <label for="children">Children</label>
            <input type="number" id="children" name="children" min="0" max="20" required>

            <label for="smoker">Smoker</label>
            <select id="smoker" name="smoker">
                {% for smoker in smokers %}
                <option value="{{ smoker.value }}">{{ smoker.value|capitalize }}</option>
                {% endfor %}
            </select>

            <label for="region">Region</label>
            <select id="region" name="region">
                {% for region in regions %}
                <option value="{{ region.value }}">{{ region.value|capitalize }}</option>
                {% endfor %}
            </select>

            <button type="submit">Predict</button>
        </form>

        <p class="api-note">Prefer JSON? See the <a href="/docs">API docs</a>.</p>
    </main>
</body>
</html>
